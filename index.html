<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" href="./images/fav_logo.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="./css/style.css">
    <title>Movie catalog</title>
</head>

<header class="header">
    <div class="container bottom__border">
        <div class="header__content">
            <form class="header__search--form">
                <input type="text" class="header__search" placeholder="Search"></input>
            </form>
            <a href="index.html" class="header__logo"> <img class="header__logo" src="./images/logo.png" alt=""> </a>            
        </div>
    </div>
</header>

<body>
    <div class="container">
        <div class="movies">
        </div>
        <div class="pagination">
            <div class="pagination__elements">
                <button type="button" class="pagination__prev"><</button> <button type="button" class="pagination__button pagination__active pagination__first">1
                </button>
                <button type="button" class="pagination__button">2</button>
                <button type="button" class="pagination__button">3</button>
                <button type="button" class="pagination__button">4</button>
                <button type="button" class="pagination__button">5</button>
                <button type="button" class="pagination__next">></button>
            </div>
        </div>
    </div>
    <div class="modal">
    </div>
    <div class="scroll__button">
        <p class="fa fa-angle-double-up arrow__top"></p>
    </div>
    <script src="./js/app-en.js"></script>
</body>

<footer class="footer">
    <div class="container top__border">
        <div class="footer__logo--container">
            <a href="index.html" class="footer__logo"> <img class="footer__logo" src="./images/logo.png" alt=""> </a>
            <p class="footer__info">Diploma project. Mykhailo Matiushchenko</p>
        </div>
        <div class="footer__content">
            <p class="footer__info">movie catalog website</p>
        </div>
    </div>
</footer>

</html>
